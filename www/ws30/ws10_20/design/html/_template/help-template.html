<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>도움말 템플릿</title>
  <style>

    /* =====================================================
     * CSS Variables
     * ===================================================== */
    :root {
      --bg:          #0b1220;
      --border:      #243553;
      --text:        #e7eefc;
      --text-muted:  #a9b8d6;
      --text-faint:  #647891;
      --accent:      #4aa3ff;

      --code-bg:     rgba(74,163,255,.08);
      --code-border: rgba(74,163,255,.18);
      --code-text:   #7dd3fc;
      --pre-bg:      #090f1c;
      --pre-border:  #1e2f47;

      --table-head-bg:   rgba(74,163,255,.1);
      --table-row-even:  rgba(255,255,255,.02);
      --table-row-hover: rgba(74,163,255,.06);

      --bq-border: #4aa3ff;
      --bq-bg:     rgba(74,163,255,.05);

      --scrollbar-thumb: #647891;
    }

    body.light-mode {
      --bg:          #f5f7fa;
      --border:      #dde1ea;
      --text:        #101828;
      --text-muted:  #475467;
      --text-faint:  #98a2b3;
      --accent:      #2563eb;

      --code-bg:     rgba(37,99,235,.06);
      --code-border: rgba(37,99,235,.15);
      --code-text:   #1d4ed8;
      --pre-bg:      #f8faff;
      --pre-border:  #dde1ea;

      --table-head-bg:   rgba(37,99,235,.07);
      --table-row-even:  rgba(0,0,0,.02);
      --table-row-hover: rgba(37,99,235,.04);

      --bq-border: #2563eb;
      --bq-bg:     rgba(37,99,235,.04);

      --scrollbar-thumb: #c0c8d8;
    }


    /* =====================================================
     * Reset & Base
     * ===================================================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body > header { display: none; } /* pandoc 자동 생성 title 헤더 숨김 */

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', system-ui, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.75;
      min-height: 100vh;
      margin: 0 auto;
      padding: 32px 24px 80px;
      transition: background .2s, color .2s;
    }

    /* 언어 전환 페이드 마스크 */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      opacity: .55;
      pointer-events: none;
      transition: opacity .4s ease;
    }
    body.lang-ready::after { opacity: 0; }


    /* =====================================================
     * Scrollbar
     * ===================================================== */
    ::-webkit-scrollbar        { width: 16px; height: 16px; }
    ::-webkit-scrollbar-track  { background: var(--bg); }
    ::-webkit-scrollbar-thumb  {
      background: var(--scrollbar-thumb);
      border: 3px solid var(--bg);
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover { filter: brightness(1.2); }
    ::-webkit-scrollbar-corner { background: var(--bg); }


    /* =====================================================
     * Headings
     * ===================================================== */
    h1,
    h2 {
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
      margin: 2em 0 .65em;
    }
    :is(h1, h2):first-child { margin-top: 0; }

    h1 {
      font-size: 22px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--border);
      position: relative;
    }
    h1::after {
      content: '';
      position: absolute; left: 0; bottom: -2px;
      width: 52px; height: 2px;
      background: var(--accent);
      border-radius: 2px;
    }

    h2 {
      font-size: 17px;
      color: var(--accent);
      display: flex; align-items: center; gap: 10px;
    }
    h2::after {
      content: '';
      flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }


    /* =====================================================
     * Paragraph & Inline
     * ===================================================== */
    p {
      font-size: 14px;
      color: var(--text);
      margin: 0 0 .9em;
    }
    p:last-child { margin-bottom: 0; }

    strong,
    b { font-weight: 700; color: var(--text); }

    em,
    i { font-style: italic; color: var(--text-muted); }

    code {
      font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
      font-size: 12.5px;
      background: var(--code-bg);
      color: var(--code-text);
      border: 1px solid var(--code-border);
      border-radius: 4px;
      padding: 1px 6px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color .15s, opacity .15s;
    }
    a:hover {
      border-bottom-color: var(--accent);
      opacity: .8;
    }


    /* =====================================================
     * Blockquote
     * ===================================================== */
    blockquote {
      margin: 1.2em 0;
      padding: 12px 16px;
      border-left: 4px solid var(--bq-border);
      background: var(--bq-bg);
      border-radius: 0 8px 8px 0;
      font-size: 13.5px;
    }
    blockquote p {
      margin: 0;
      color: var(--text-muted);
    }
    blockquote p + p { margin-top: .5em; }


    /* =====================================================
     * Lists
     * ===================================================== */
    ul,
    ol {
      margin: .6em 0 1em 1.4em;
      padding-left: .4em;
    }
    li {
      font-size: 14px;
      color: var(--text);
      margin-bottom: .3em;
    }
    ul > li::marker { color: var(--accent); }
    ol > li::marker { color: var(--accent); font-weight: 700; }

    /* ol 이용 안내 : 제목(strong) / 본문(span) 구분 */
    ol > li p                  { margin: 0; }
    ol > li p > strong:first-child { display: block; margin-bottom: 3px; }
    ol > li p > strong + span  {
      color: var(--text-muted);
      font-size: 13.5px;
    }


    /* =====================================================
     * Code Block
     * ===================================================== */
    pre {
      margin: 1.2em 0;
      padding: 16px 18px;
      background: var(--pre-bg);
      border: 1px solid var(--pre-border);
      border-radius: 10px;
      overflow-x: auto;
    }
    pre code {
      background: none; border: none; padding: 0;
      font-size: 13px; color: var(--text-muted);
    }


    /* =====================================================
     * Table
     * ===================================================== */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.2em 0;
      font-size: 13.5px;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      /* pandoc 기본 display:block 덮어쓰기 */
      display: table;
    }
    thead tr { background: var(--table-head-bg); }
    th {
      padding: 10px 14px;
      font-weight: 700; font-size: 12px;
      letter-spacing: .05em; text-transform: uppercase;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    td {
      padding: 9px 14px;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tr:last-child td           { border-bottom: none; }
    tbody tr:nth-child(even)   { background: var(--table-row-even); }
    tbody tr:hover             { background: var(--table-row-hover); }


    /* =====================================================
     * Image / Figure
     * ===================================================== */
    img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
      display: block;
      margin: 0;
    }
    figure { margin: 0 0 2em; }
    figcaption {
      font-size: 12px;
      color: var(--text-faint);
      margin-top: 6px;
    }


    /* =====================================================
     * Horizontal Rule
     * ===================================================== */
    hr {
      border: none; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 2em 0;
    }

  </style>

  <script>
    const oAPP = {
      attr: { theme: '', parentId: '' },
      IF_DATA: {}
    };

    window.toggleTheme = function(mode) {
      if (mode === 'light')     document.body.classList.add('light-mode');
      else if (mode === 'dark') document.body.classList.remove('light-mode');
      else                      document.body.classList.toggle('light-mode');
      return document.body.classList.contains('light-mode') ? 'light' : 'dark';
    };

    window.getCurrentTheme = function() {
      return document.body.classList.contains('light-mode') ? 'light' : 'dark';
    };

    function applyLang(lang) {
      if (!lang || typeof lang !== 'object') return;
      Object.entries(lang).forEach(([id, value]) => {
        const el = document.getElementById(id);
        if (!el) return;
        if (typeof value === 'string') {
          el.textContent = value;
        } else if (value && typeof value === 'object') {
          if (value.html !== undefined) el.innerHTML   = value.html;
          if (value.text !== undefined) el.textContent = value.text;
        }
      });
      
    }

    window.addEventListener('init', (e) => {
      oAPP.IF_DATA       = e.detail.IF_DATA   || {};
      oAPP.attr.theme    = e.detail.theme     || 'dark';
      oAPP.attr.parentId = e.detail.parentId  || '';
      toggleTheme(oAPP.attr.theme);
      if (e.detail.htmlLan) applyLang(e.detail.htmlLan);

      requestAnimationFrame(() => document.body.classList.add('lang-ready'));

    });

    function dispatchToParent(eventName, detail) {
      const dom = parent.document.getElementById(oAPP.attr.parentId);
      if (!dom) return;
      dom.dispatchEvent(new CustomEvent(eventName, { detail }));
    }
  </script>
</head>

<body>
$body$
</body>
</html>
