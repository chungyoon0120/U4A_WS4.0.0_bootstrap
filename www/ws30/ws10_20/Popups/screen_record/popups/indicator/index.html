<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    pointer-events: none; /* 클릭 완전 통과 */
  }

  /* ── 테두리 레이어 ─────────────────────────────────
     모니터 전체를 감싸는 얇은 테두리.
     기본: 숨김 / recording: 테두리 없음 / paused: 노랑
  ─────────────────────────────────────────────── */
  .border-ring {
    position: fixed;
    inset: 0;
    border: 5px solid transparent;
    border-radius: 0;
    pointer-events: none;
    transition: border-color 0.3s, opacity 0.3s;
    opacity: 0;
  }

  /* recording 상태 테두리 표시 제거 */
  /* .border-ring.recording 규칙 삭제 — 빨간 테두리 미표시 */

  /* paused 상태 테두리 표시 제거 */
  /* .border-ring.paused 규칙 삭제 — 노란 테두리 미표시 */

  /* ── 코너 뱃지 ─────────────────────────────────────
     좌상단 소형 뱃지: "● REC  모니터 N  00:00:00"
     recording/paused 상태에서만 표시
  ─────────────────────────────────────────────── */
  .corner-badge {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    align-items: center;
    gap: 7px;
    padding: 6px 16px 7px 12px;
    background: rgba(20, 28, 38, 0.88);
    backdrop-filter: blur(14px) saturate(1.6);
    -webkit-backdrop-filter: blur(14px) saturate(1.6);
    border-radius: 0 0 14px 14px;
    border: 1px solid rgba(255,255,255,0.10);
    border-top: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.55);
    pointer-events: none;
    white-space: nowrap;
  }
  body.light .corner-badge {
    background: rgba(234, 236, 238, 0.95);
    border-color: rgba(0,0,0,0.08);
    border-top: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.20);
  }

  .corner-badge.visible { display: flex; }

  /* 녹화 표시 점 */
  .rec-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #E94560; flex-shrink: 0;
  }
  .corner-badge.recording .rec-dot {
    animation: dot-blink 1.2s ease-in-out infinite;
  }
  .corner-badge.paused .rec-dot {
    background: #FFD60A;
    animation: none;
  }
  @keyframes dot-blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

  /* 모니터 번호 뱃지 */
  .monitor-badge {
    font-size: 9px; font-weight: 800;
    letter-spacing: 0.6px; padding: 1px 5px;
    border-radius: 4px;
    background: rgba(124,108,248,0.25);
    color: #9D91FF;
    border: 1px solid rgba(124,108,248,0.35);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    white-space: nowrap;
  }

  /* 상태 텍스트 */
  .status-text {
    font-size: 10px; font-weight: 800;
    letter-spacing: 1.2px;
    color: #E94560;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .corner-badge.paused .status-text { color: #FFD60A; }
  body.light .status-text { color: #D0002A; }

  /* 구분선 */
  .sep {
    width: 1px; height: 12px;
    background: rgba(255,255,255,0.18);
  }
  body.light .sep { background: rgba(0,0,0,0.12); }

  /* 타이머 */
  .timer-text {
    font-size: 11px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.8px;
    color: rgba(255,255,255,0.85);
    font-family: 'Consolas', 'Monaco', monospace;
  }
  body.light .timer-text { color: rgba(26,35,50,0.87); }
</style>
</head>
<body>

<!-- 모니터 전체 테두리 -->
<div class="border-ring" id="borderRing"></div>

<!-- 좌상단 소형 뱃지 -->
<div class="corner-badge" id="cornerBadge">
  <div class="rec-dot"></div>
  <span class="status-text"  id="statusText">REC</span>
  <div class="sep"></div>
  <span class="monitor-badge" id="monitorBadge">M1</span>
  <div class="sep"></div>
  <span class="timer-text"   id="timerText">00:00:00</span>
</div>

<script src="./index.js"></script>
</body>
</html>
