<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>녹화 히스토리</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg       : #1d232a;
    --surface  : #242c35;
    --surface2 : #2b3441;
    --border   : #374859;
    --accent   : #7C6CF8;
    --accent-h : #9D91FF;
    --accent-dim: rgba(124,108,248,0.12);
    --new      : #4CAF50;
    --new-dim  : rgba(76,175,80,0.10);
    --danger   : #E94560;
    --text1    : #dce6f0;
    --text2    : #7890a4;
    --text3    : #435264;
    --radius   : 10px;
  }
  body.light {
    --bg       : #eaecee;
    --surface  : #ffffff;
    --surface2 : #dde0e4;
    --border   : #c4cad1;
    --text1    : #1a2332;
    --text2    : #4a5a6b;
    --text3    : #8595a3;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg); color: var(--text1);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
    font-size: 13px; overflow: hidden; user-select: none;
  }

  .app {
    display: flex; flex-direction: column; height: 100vh;
    border: 1px solid var(--border); border-radius: 12px;
    overflow: hidden; box-shadow: 0 16px 48px rgba(0,0,0,0.55);
  }

  /* ── Titlebar ─────────────────────────────────── */
  .titlebar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px; height: 50px; flex-shrink: 0;
    background: var(--surface); border-bottom: 1px solid var(--border);
    -webkit-app-region: drag;
  }
  .t-left { display: flex; align-items: center; gap: 10px; }
  .t-icon {
    width: 28px; height: 28px; border-radius: 7px; flex-shrink: 0;
    background: linear-gradient(135deg, var(--accent), #E94560);
    display: flex; align-items: center; justify-content: center;
  }
  .titlebar h1 { font-size: 14px; font-weight: 700; }
  .titlebar-dir {
    font-size: 11px; color: var(--text3); margin-top: 1px;
    max-width: 400px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .t-right { -webkit-app-region: no-drag; display: flex; align-items: center; gap: 7px; }

  .hd-btn {
    display: flex; align-items: center; gap: 5px;
    height: 30px; padding: 0 12px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text2);
    font-size: 11.5px; font-weight: 600; font-family: inherit; cursor: pointer;
    transition: all 0.14s;
  }
  .hd-btn:hover { color: var(--text1); border-color: var(--accent); }
  .hd-btn.refreshing svg { animation: spin 0.75s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .btn-x {
    width: 26px; height: 26px; border-radius: 50%; border: none;
    background: transparent; cursor: pointer; color: var(--text3);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.14s, color 0.14s;
  }
  .btn-x:hover { background: var(--danger); color: #fff; }

  /* ── Summary bar ─────────────────────────────── */
  .summary-bar {
    display: flex; align-items: center; gap: 14px;
    padding: 8px 18px; background: var(--surface2);
    border-bottom: 1px solid var(--border); flex-shrink: 0;
    font-size: 11.5px; color: var(--text2);
  }
  .sum-val { font-weight: 700; color: var(--text1); font-variant-numeric: tabular-nums; }
  .s-dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
  .watch-badge {
    margin-left: auto; display: flex; align-items: center; gap: 5px;
    font-size: 10.5px; color: var(--text3);
  }
  .watch-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--new); flex-shrink: 0;
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .watch-badge.error .watch-dot { background: var(--text3); animation: none; }

  /* ── Content (스크롤 영역) ────────────────────── */
  .content {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 12px 14px;
    display: flex; flex-direction: column; gap: 8px;
  }
  .content::-webkit-scrollbar { width: 5px; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── 상태 화면 ────────────────────────────────── */
  .state-screen {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; gap: 14px; color: var(--text3);
  }
  .state-screen.visible { display: flex; }
  .state-screen svg { opacity: 0.3; }
  .state-screen p { font-size: 13px; }
  .spinner-lg {
    width: 34px; height: 34px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.75s linear infinite;
  }

  /* ── List item ────────────────────────────────── */
  .list-item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 13px 14px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--radius); cursor: default;
    transition: border-color 0.14s, box-shadow 0.14s;
    position: relative;
  }
  .list-item:hover {
    border-color: var(--accent);
    box-shadow: 0 3px 16px rgba(124,108,248,0.15);
  }
  .list-item.is-new {
    border-color: var(--new);
    background: var(--new-dim);
    box-shadow: 0 0 0 1px rgba(76,175,80,0.2);
  }
  .list-item.is-new:hover {
    border-color: var(--new);
    box-shadow: 0 3px 16px rgba(76,175,80,0.15);
  }

  /* NEW 뱃지 */
  .new-badge {
    position: absolute; top: 10px; right: 10px;
    background: var(--new); color: #fff;
    font-size: 9px; font-weight: 800; letter-spacing: 1px;
    padding: 2px 7px; border-radius: 4px;
    box-shadow: 0 1px 6px rgba(76,175,80,0.45);
  }

  /* ── 썸네일 ───────────────────────────────────── */
  .thumb-wrap {
    width: 160px; min-width: 160px; height: 90px;
    border-radius: 7px; overflow: hidden; background: #080813;
    position: relative; flex-shrink: 0;
  }
  .thumb-video {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .thumb-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0); transition: background 0.18s;
    border-radius: 7px;
  }
  .list-item:hover .thumb-overlay { background: rgba(0,0,0,0.28); }
  .play-icon {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.92);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transform: scale(0.8);
    transition: opacity 0.18s, transform 0.18s;
  }
  .list-item:hover .play-icon { opacity: 1; transform: scale(1); }
  .play-icon svg { color: #1A1A2E; margin-left: 2px; }

  /* ── 정보 영역 ────────────────────────────────── */
  .info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 5px; }

  .info-name {
    font-size: 14px; font-weight: 700; color: var(--text1);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .info-row {
    display: flex; align-items: center; gap: 6px;
    font-size: 11.5px; color: var(--text2);
    flex-wrap: wrap;
  }
  .info-row svg { flex-shrink: 0; opacity: 0.7; }
  .info-label { font-weight: 600; color: var(--text3); font-size: 11px; }
  .info-sep { width: 2px; height: 2px; border-radius: 50%; background: var(--text3); flex-shrink: 0; }

  .info-path {
    font-size: 11px; color: var(--text3);
    font-family: 'Consolas', monospace;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: default;
  }
  .info-path:hover { color: var(--text2); }

  /* ── 하단 액션 버튼 ────────────────────────────── */
  .info-actions { display: flex; align-items: center; gap: 8px; margin-top: 4px; }

  .btn-play {
    display: flex; align-items: center; gap: 6px;
    height: 28px; padding: 0 13px;
    background: var(--accent); color: #fff;
    border: none; border-radius: 6px;
    font-size: 11.5px; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: all 0.14s;
    box-shadow: 0 1px 8px rgba(124,108,248,0.35);
  }
  .btn-play:hover {
    background: var(--accent-h); transform: translateY(-1px);
    box-shadow: 0 3px 12px rgba(124,108,248,0.5);
  }

  .btn-reveal {
    display: flex; align-items: center; gap: 5px;
    height: 28px; padding: 0 11px;
    background: transparent; border: 1px solid #0EA5E9;
    border-radius: 6px; color: #0EA5E9;
    font-size: 11.5px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: all 0.14s;
  }
  .btn-reveal:hover { background: rgba(14,165,233,0.12); border-color: #38BDF8; color: #38BDF8; }

  .btn-delete {
    display: flex; align-items: center; gap: 5px;
    height: 28px; padding: 0 11px;
    background: transparent; border: 1px solid var(--danger);
    border-radius: 6px; color: var(--danger);
    font-size: 11.5px; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: all 0.14s; margin-left: auto;
  }
  .btn-delete:hover {
    background: rgba(233,69,96,0.10);
  }

  /* ── Footer ───────────────────────────────────── */
  .footer {
    display: flex; justify-content: flex-end;
    padding: 10px 14px; border-top: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .btn-close {
    height: 34px; padding: 0 22px; border-radius: 7px; border: none;
    background: var(--accent); color: #fff;
    font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer;
    transition: all 0.14s; box-shadow: 0 2px 8px rgba(124,108,248,0.32);
  }
  .btn-close:hover { background: var(--accent-h); transform: translateY(-1px); }
</style>
</head>
<body>
<div class="app">

  <!-- Titlebar -->
  <div class="titlebar">
    <div class="t-left">
      <div class="t-icon">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2">
          <rect x="2" y="2" width="8" height="8" rx="1.5"/>
          <rect x="14" y="2" width="8" height="8" rx="1.5"/>
          <rect x="2" y="14" width="8" height="8" rx="1.5"/>
          <rect x="14" y="14" width="8" height="8" rx="1.5"/>
        </svg>
      </div>
      <div>
        <h1 id="titleLbl">녹화 히스토리</h1>
        <div class="titlebar-dir" id="titlebarDir">-</div>
      </div>
    </div>
    <div class="t-right">
      <button class="hd-btn" id="btnOpenFolder">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/>
        </svg>
        <span id="btnOpenFolderLbl">폴더 열기</span>
      </button>
      <button class="hd-btn" id="btnRefresh">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
        </svg>
        <span id="btnRefreshLbl">새로고침</span>
      </button>
      <button class="btn-x" id="btnCloseWin">
        <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
          <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Summary bar -->
  <div class="summary-bar" id="summaryBar" style="display:none">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="2" width="8" height="8" rx="1.5"/><rect x="14" y="2" width="8" height="8" rx="1.5"/>
      <rect x="2" y="14" width="8" height="8" rx="1.5"/><rect x="14" y="14" width="8" height="8" rx="1.5"/>
    </svg>
    <span id="sumWord">영상</span> <span class="sum-val" id="sumCount">0</span><span id="sumUnit">개</span>
    <div class="s-dot"></div>
    <span id="sumTotalWord">총</span> <span class="sum-val" id="sumSize">0 MB</span>
    <div class="watch-badge" id="watchBadge">
      <div class="watch-dot"></div>
      <span id="watchText">자동 갱신 중</span>
    </div>
  </div>

  <!-- Content -->
  <div class="content" id="content">
    <div class="state-screen visible" id="loadingScreen">
      <div class="spinner-lg"></div>
      <p id="loadingText">목록 불러오는 중...</p>
    </div>
    <div class="state-screen" id="emptyScreen">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <rect x="2" y="2" width="20" height="20" rx="3"/>
        <path d="M10 8l6 4-6 4V8z"/>
      </svg>
      <p id="emptyText">저장된 영상이 없습니다.</p>
    </div>
    <div id="list"></div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <button class="btn-close" id="btnClose">닫기</button>
  </div>

</div>
<script src="./index.js"></script>
</body>
</html>
