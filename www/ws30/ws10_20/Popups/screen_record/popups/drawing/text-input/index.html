<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    font-family: 'Malgun Gothic','Apple SD Gothic Neo',-apple-system,sans-serif;
    overflow: hidden;
  }
  body {
    background: rgba(22,30,40,0.97);
    color: rgba(255,255,255,0.90);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    display: flex; flex-direction: column;
    user-select: none;
  }
  body.light {
    background: rgba(234,236,238,0.98);
    color: rgba(26,35,50,0.90);
    border-color: rgba(0,0,0,0.10);
  }

  /* ── 헤더 ──────────────────────────────────────────── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    -webkit-app-region: drag; flex-shrink: 0;
    gap: 8px;
  }
  body.light .header { border-bottom-color: rgba(0,0,0,0.08); }
  /* 제목 아이콘 — 다른 팝업의 .t-icon 과 동일한 gradient 박스 */
  .header-icon {
    width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
    background: linear-gradient(135deg, #7C6CF8, #E94560);
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .header-title {
    flex: 1; font-size: 13px; font-weight: 600;
    color: rgba(255,255,255,0.75); pointer-events: none;
  }
  body.light .header-title { color: rgba(26,35,50,0.70); }
  /* 통합 닫기 버튼 — 다른 팝업의 .btn-x 와 동일한 스타일 */
  .btn-close {
    width: 26px; height: 26px; border-radius: 50%; border: none;
    background: transparent; cursor: pointer; color: rgba(255,255,255,0.45);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
    -webkit-app-region: no-drag; flex-shrink: 0;
  }
  body.light .btn-close { color: rgba(26,35,50,0.40); }
  .btn-close:hover { background: #E94560; color: #fff; }

  /* ── 툴바 ──────────────────────────────────────────── */
  .toolbar {
    display: flex; align-items: center; gap: 4px;
    padding: 7px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    background: rgba(255,255,255,0.03);
    flex-shrink: 0;
    position: relative;
  }
  body.light .toolbar { border-bottom-color: rgba(0,0,0,0.07); background: rgba(0,0,0,0.03); }

  /* ── 커스텀 드롭다운 트리거 ─────────────────────────── */
  .csel {
    position: relative; flex-shrink: 0;
  }
  .csel-trigger {
    height: 28px;
    display: flex; align-items: center; justify-content: space-between; gap: 5px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    color: rgba(255,255,255,0.82);
    font-family: inherit; font-size: 12px;
    padding: 0 7px 0 8px;
    cursor: pointer;
    transition: border-color 0.14s, background 0.14s;
    white-space: nowrap; overflow: hidden;
  }
  .csel-trigger:hover { background: rgba(255,255,255,0.11); border-color: rgba(255,255,255,0.22); }
  .csel-trigger.open  { border-color: rgba(124,108,248,0.65); background: rgba(255,255,255,0.10); }
  .csel-value { overflow: hidden; text-overflow: ellipsis; }
  .csel-arrow {
    flex-shrink: 0; width: 10px; height: 10px;
    color: rgba(255,255,255,0.40);
    transition: transform 0.14s;
  }
  .csel-trigger.open .csel-arrow { transform: rotate(180deg); }

  body.light .csel-trigger { background: rgba(0,0,0,0.05); border-color: rgba(0,0,0,0.14); color: rgba(26,35,50,0.85); }
  body.light .csel-trigger:hover { background: rgba(0,0,0,0.08); border-color: rgba(0,0,0,0.22); }
  body.light .csel-trigger.open  { border-color: rgba(80,70,200,0.60); }
  body.light .csel-arrow { color: rgba(0,0,0,0.30); }

  .csel-font  .csel-trigger { width: 116px; }
  .csel-size  .csel-trigger { width: 60px; }

  /* ── 커스텀 드롭다운 목록 ───────────────────────────── */
  .csel-list {
    display: none;
    position: fixed;
    z-index: 1000;
    background: rgba(24,32,42,0.99);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.55);
    padding: 4px;
    overflow-y: auto;
    max-height: 220px;
  }
  .csel-list.visible { display: block; }

  body.light .csel-list {
    background: rgba(248,249,250,0.99);
    border-color: rgba(0,0,0,0.13);
    box-shadow: 0 6px 24px rgba(0,0,0,0.16);
  }

  /* 스크롤바 */
  .csel-list::-webkit-scrollbar              { width: 4px; }
  .csel-list::-webkit-scrollbar-track        { background: transparent; }
  .csel-list::-webkit-scrollbar-thumb        { background: rgba(124,108,248,0.35); border-radius: 3px; }
  body.light .csel-list::-webkit-scrollbar-thumb { background: rgba(80,70,200,0.25); }

  .csel-option {
    padding: 6px 10px;
    font-size: 12px; font-family: inherit;
    color: rgba(255,255,255,0.80);
    border-radius: 5px;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.10s;
  }
  .csel-option:hover    { background: rgba(124,108,248,0.20); color: rgba(255,255,255,1); }
  .csel-option.selected { background: rgba(124,108,248,0.30); color: rgba(255,255,255,1); font-weight: 600; }

  body.light .csel-option { color: rgba(26,35,50,0.80); }
  body.light .csel-option:hover    { background: rgba(80,70,200,0.12); color: rgba(26,35,50,1); }
  body.light .csel-option.selected { background: rgba(80,70,200,0.18); color: rgba(26,35,50,1); font-weight: 600; }

  /* ── 구분선 ─────────────────────────────────────────── */
  .sep-v {
    width: 1px; height: 18px;
    background: rgba(255,255,255,0.10);
    flex-shrink: 0; margin: 0 2px;
  }
  body.light .sep-v { background: rgba(0,0,0,0.10); }

  /* ── 서식 버튼 ─────────────────────────────────────── */
  .fmt-btn {
    width: 28px; height: 28px;
    border-radius: 6px; border: none;
    background: transparent;
    color: rgba(255,255,255,0.65);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-family: inherit; font-size: 13px;
    transition: background 0.12s, color 0.12s; flex-shrink: 0;
  }
  .fmt-btn:hover  { background: rgba(255,255,255,0.09); color: rgba(255,255,255,0.90); }
  .fmt-btn.active { background: rgba(124,108,248,0.22); color: rgba(148,135,255,1); }
  .fmt-btn-bold   { font-weight: 700; }
  .fmt-btn-italic { font-style: italic; font-weight: 400; }
  .fmt-btn-strike { text-decoration: line-through; }
  .fmt-btn-underline { text-decoration: underline; }
  body.light .fmt-btn { color: rgba(26,35,50,0.55); }
  body.light .fmt-btn:hover  { background: rgba(0,0,0,0.07); color: rgba(26,35,50,0.85); }
  body.light .fmt-btn.active { background: rgba(80,70,200,0.14); color: rgba(80,70,200,1); }

  /* ── 글자 색상 버튼 (TinyMCE: A + 컬러바) ─────────── */
  .color-trigger {
    width: 28px; height: 28px;
    border-radius: 6px; border: none;
    background: transparent; cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 2px;
    transition: background 0.12s; flex-shrink: 0; padding: 0;
  }
  .color-trigger:hover    { background: rgba(255,255,255,0.09); }
  .color-trigger.panel-open { background: rgba(124,108,248,0.22); }
  body.light .color-trigger:hover     { background: rgba(0,0,0,0.07); }
  body.light .color-trigger.panel-open { background: rgba(80,70,200,0.14); }
  .color-trigger-letter { font-size: 13px; font-weight: 700; line-height: 1; color: rgba(255,255,255,0.78); pointer-events: none; }
  body.light .color-trigger-letter { color: rgba(26,35,50,0.70); }
  .color-trigger-bar { width: 16px; height: 3px; border-radius: 2px; pointer-events: none; }

  /* ── 컬러 패널 ─────────────────────────────────────── */
  .color-panel {
    display: none; position: fixed; z-index: 999;
    background: rgba(24,32,42,0.99);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.55);
    padding: 12px; width: 210px;
  }
  .color-panel.visible { display: block; }
  body.light .color-panel {
    background: rgba(245,246,248,0.99);
    border-color: rgba(0,0,0,0.13);
    box-shadow: 0 8px 28px rgba(0,0,0,0.18);
  }

  .panel-label { font-size: 10px; font-weight: 600; letter-spacing: 0.5px; color: rgba(255,255,255,0.32); margin-bottom: 7px; }
  body.light .panel-label { color: rgba(0,0,0,0.32); }

  .color-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 3px; margin-bottom: 10px; }

  .color-swatch {
    width: 20px; height: 20px; border-radius: 4px; cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.10s, border-color 0.10s;
  }
  .color-swatch:hover    { transform: scale(1.18); }
  .color-swatch.selected { border-color: rgba(255,255,255,0.90); transform: scale(1.12); }
  body.light .color-swatch.selected { border-color: rgba(0,0,0,0.60); }

  .panel-sep { height: 1px; background: rgba(255,255,255,0.08); margin: 10px 0; }
  body.light .panel-sep { background: rgba(0,0,0,0.08); }

  .custom-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .custom-label { font-size: 11px; color: rgba(255,255,255,0.45); flex-shrink: 0; }
  body.light .custom-label { color: rgba(0,0,0,0.38); }

  .custom-picker-btn {
    position: relative; width: 28px; height: 22px;
    border-radius: 5px; border: 1px solid rgba(255,255,255,0.18);
    cursor: pointer; flex-shrink: 0; overflow: hidden;
  }
  body.light .custom-picker-btn { border-color: rgba(0,0,0,0.18); }
  .custom-picker-btn input[type="color"] {
    position: absolute; inset: -4px; opacity: 0; cursor: pointer;
    width: calc(100% + 8px); height: calc(100% + 8px);
  }
  .custom-color-preview { position: absolute; inset: 0; border-radius: 4px; pointer-events: none; }

  .preview-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .preview-label { font-size: 11px; color: rgba(255,255,255,0.45); flex-shrink: 0; }
  body.light .preview-label { color: rgba(0,0,0,0.38); }
  .preview-box { flex: 1; height: 22px; border-radius: 5px; border: 1px solid rgba(255,255,255,0.12); }
  body.light .preview-box { border-color: rgba(0,0,0,0.12); }
  .preview-hex { font-size: 11px; font-family: 'Courier New',monospace; color: rgba(255,255,255,0.45); flex-shrink: 0; }
  body.light .preview-hex { color: rgba(0,0,0,0.38); }

  .panel-footer { display: flex; justify-content: flex-end; }
  .btn-apply {
    height: 28px; padding: 0 16px;
    border-radius: 7px; border: none; cursor: pointer;
    font-size: 12px; font-weight: 600; font-family: inherit;
    background: rgba(124,108,248,0.85); color: #fff;
    transition: background 0.14s;
  }
  .btn-apply:hover { background: rgba(124,108,248,1); }
  body.light .btn-apply { background: rgba(80,70,200,0.85); }
  body.light .btn-apply:hover { background: rgba(80,70,200,1); }

  /* ── 에디터 ─────────────────────────────────────────── */
  .editor-wrap { flex: 1; overflow: hidden; padding: 10px 14px 12px; display: flex; flex-direction: column; }
  #editor {
    flex: 1; min-height: 0; overflow-y: auto; outline: none;
    font-family: 'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
    font-size: 14px; line-height: 1.65; color: rgba(255,255,255,0.90);
    word-break: break-word; white-space: pre-wrap; user-select: text;
    caret-color: rgba(124,108,248,1);
  }
  body.light #editor { color: rgba(26,35,50,0.88); caret-color: rgba(80,70,200,1); }
  #editor:empty::before { content: attr(data-placeholder); color: rgba(255,255,255,0.22); pointer-events: none; font-style: italic; }
  body.light #editor:empty::before { color: rgba(0,0,0,0.22); }
  #editor::-webkit-scrollbar              { width: 5px; }
  #editor::-webkit-scrollbar-track        { background: transparent; border-radius: 3px; }
  #editor::-webkit-scrollbar-thumb        { background: rgba(124,108,248,0.30); border-radius: 3px; }
  #editor::-webkit-scrollbar-thumb:hover  { background: rgba(124,108,248,0.60); }
  body.light #editor::-webkit-scrollbar-thumb       { background: rgba(80,70,200,0.20); }
  body.light #editor::-webkit-scrollbar-thumb:hover { background: rgba(80,70,200,0.45); }
  #editor font { display: inline; }
</style>
</head>
<body>

<!-- ── 헤더 ─────────────────────────────────────────── -->
<div class="header">
  <!-- 제목 아이콘: 다른 팝업의 .t-icon 과 동일한 구조 -->
  <div class="header-icon">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20h9"/>
      <path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/>
    </svg>
  </div>
  <span class="header-title" id="headerTitle">메모</span>
  <button class="btn-close" id="btnClose" title="닫기">
    <svg width="10" height="10" viewBox="0 0 12 12" fill="none">
      <path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
  </button>
</div>

<!-- ── 툴바 ─────────────────────────────────────────── -->
<div class="toolbar" id="toolbar">

  <!-- 폰트 패밀리 커스텀 드롭다운 -->
  <div class="csel csel-font" id="cselFont">
    <div class="csel-trigger" id="cselFontTrigger">
      <span class="csel-value" id="cselFontValue">맑은 고딕</span>
      <svg class="csel-arrow" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1,1 5,5 9,1"/>
      </svg>
    </div>
  </div>

  <!-- 폰트 크기 커스텀 드롭다운 -->
  <div class="csel csel-size" id="cselSize">
    <div class="csel-trigger" id="cselSizeTrigger">
      <span class="csel-value" id="cselSizeValue">28</span>
      <svg class="csel-arrow" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1,1 5,5 9,1"/>
      </svg>
    </div>
  </div>

  <div class="sep-v"></div>

  <button class="fmt-btn fmt-btn-bold"      id="btnBold"      title="굵게 (Ctrl+B)">B</button>
  <button class="fmt-btn fmt-btn-italic"    id="btnItalic"    title="기울기 (Ctrl+I)">I</button>
  <button class="fmt-btn fmt-btn-strike"    id="btnStrike"    title="취소선">S</button>
  <button class="fmt-btn fmt-btn-underline" id="btnUnderline" title="밑줄 (Ctrl+U)">U</button>

  <div class="sep-v"></div>

  <!-- 글자 색상 트리거 (TinyMCE 스타일) -->
  <button class="color-trigger" id="colorTrigger" title="글자 색상">
    <span class="color-trigger-letter">A</span>
    <div class="color-trigger-bar" id="colorTriggerBar"></div>
  </button>

</div>

<!-- ── 폰트 목록 (fixed 드롭다운) ────────────────────── -->
<div class="csel-list" id="listFont">
  <div class="csel-option selected" data-value="Malgun Gothic" style="font-family:'Malgun Gothic'">맑은 고딕</div>
  <div class="csel-option" data-value="Nanum Gothic"    style="font-family:'Nanum Gothic'">나눔고딕</div>
  <div class="csel-option" data-value="Gulim"           style="font-family:Gulim">굴림</div>
  <div class="csel-option" data-value="Dotum"           style="font-family:Dotum">돋움</div>
  <div class="csel-option" data-value="Arial"           style="font-family:Arial">Arial</div>
  <div class="csel-option" data-value="Times New Roman" style="font-family:'Times New Roman'">Times New Roman</div>
  <div class="csel-option" data-value="Courier New"     style="font-family:'Courier New'">Courier New</div>
</div>

<!-- ── 크기 목록 (fixed 드롭다운) ────────────────────── -->
<div class="csel-list" id="listSize">
  <div class="csel-option" data-value="10">10</div>
  <div class="csel-option" data-value="12">12</div>
  <div class="csel-option" data-value="14">14</div>
  <div class="csel-option" data-value="16">16</div>
  <div class="csel-option" data-value="18">18</div>
  <div class="csel-option" data-value="20">20</div>
  <div class="csel-option" data-value="24">24</div>
  <div class="csel-option selected" data-value="28">28</div>
  <div class="csel-option" data-value="32">32</div>
  <div class="csel-option" data-value="36">36</div>
  <div class="csel-option" data-value="48">48</div>
</div>

<!-- ── 컬러 패널 ─────────────────────────────────────── -->
<div class="color-panel" id="colorPanel">
  <div class="panel-label" id="panelLabelPreset">프리셋 색상</div>
  <div class="color-grid" id="colorGrid"></div>
  <div class="panel-sep"></div>
  <div class="custom-row">
    <span class="custom-label" id="customLabel">커스텀</span>
    <div class="custom-picker-btn" id="customPickerBtn" title="커스텀 색상">
      <div class="custom-color-preview" id="customColorPreview"></div>
      <input type="color" id="customColorPicker">
    </div>
  </div>
  <div class="preview-row">
    <span class="preview-label" id="previewLabel">선택</span>
    <div class="preview-box" id="previewBox"></div>
    <span class="preview-hex" id="previewHex">#FFFFFF</span>
  </div>
  <div class="panel-footer">
    <button class="btn-apply" id="btnApplyColor">확인</button>
  </div>
</div>

<!-- ── 편집 영역 ─────────────────────────────────────── -->
<div class="editor-wrap">
  <div id="editor" contenteditable="true" spellcheck="false"
       autocomplete="off" autocorrect="off" autocapitalize="off"
       data-placeholder="메모를 입력하세요"></div>
</div>

<script src="./index.js"></script>
</body>
</html>
