<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U4A WorkSpace 3.0</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div id="app">
        <div id="title-bar">
            <div class="drag-region">
                <!-- <div class="window-title-icon">U4</div> -->
                 
                <div class="window-title-text" >U4A WorkSpace 3.0 Release Notes</div>
            </div>

            <div class="window-controls">
                <button class="control-btn" id="min-btn" title="최소화">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
                <button class="control-btn" id="max-btn" title="최대화">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="4" y="4" width="16" height="16"></rect>
                    </svg>
                </button>
                <button class="control-btn close-btn" id="close-btn" title="닫기">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
        </div>

        <header>
            <div class="header-left">
                <!-- <div class="logo-icon">U4</div> -->
                <img src="./img/u4a_ws_logo.png" alt="U4A Logo" class="logo-img" draggable="false">
                <div class="title-block">
                    <h1>U4A WorkSpace 3.0</h1>
                    <p>Release Notes Professional</p>
                </div>
            </div>
            <div class="header-right">
                <span class="badge-count" id="totalBadge">0 releases</span>
                <button class="theme-toggle-btn" id="themeToggleBtn" data-msg-title="555" title="테마변경">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
                <div class="search-wrap">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                    <input id="searchInput" type="text" data-msg-placeholder="560" placeholder="버전 / 내용 검색" autocomplete="off" disabled>
                    <button class="search-clear" id="searchClear">✕</button>
                </div>
            </div>
        </header>

        <nav class="year-bar" id="yearBar">
            <span class="year-label" data-msg-id="561">연도 필터</span>
        </nav>

        <main id="viewport">
            <div id="loadingArea">
                <div class="loader-container">
                    <div class="loader-spinner"></div>
                    <div class="loader-text">
                        <span class="main-text">Initializing Workspace</span>
                        <span class="sub-text" data-msg-id="556">데이터를 안전하게 불러오는 중입니다...</span>
                    </div>
                </div>
            </div>
            <div id="emptyMsg" style="display: none;">
                <div class="empty-container">
                    <div class="empty-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                    </div>
                    <div class="empty-text">
                        <h3>검색 결과가 없습니다</h3>
                    </div>
                    <button class="reset-filter-btn" onclick="location.reload()" data-msg-id="557">전체 초기화</button>
                </div>
            </div>
            <div id="timeline"></div>
        </main>

        <button id="scrollTop" title="위로 가기" >
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M18 15l-6-6-6 6"/></svg>
        </button>
    </div>

    <!-- 로딩바 -->
    <div id="globalLoader" class="global-loader" style="display: none;">
        <div class="loader-content">
            <div class="logo-spinner">
                <img src="./img/u4aLogo.svg" alt="U4A Logo" class="loader-logo">
            </div>
            <p class="loader-message" data-msg-id="loaderMsg">데이터를 불러오는 중입니다...</p>
            <!-- loaderMsg -->
        </div>
    </div>

    <!-- 메시지 박스 -->
    <div id="globalModal" class="global-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon">
                </div>
            <div class="modal-text">
                <h3 id="modalTitle" data-msg-id="558">알림</h3>
                <p id="modalMessage" data-msg-id="559">내용을 확인해주세요.</p>
            </div>
            <div class="modal-actions">
                <button class="modal-btn" id="modalConfirmBtn" data-msg-id="002">확인</button>
            </div>
        </div>
    </div>

    <script src="./index.js"></script>
</body>
</html>
