<html>

<head>

      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
      <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
      <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

      <!-- Font Awesome 7.2.0 (아이콘) -->
      <link rel="stylesheet" href="../lib/fontawesome/7.2.0/css/all.min.css">

      <!-- 테마 시스템 (doc 12 §6.1) : tokens → themes → shell -->
      <link rel="stylesheet" href="../ws30/ws10_20/theme/tokens.css">
      <link rel="stylesheet" href="../ws30/ws10_20/theme/themes/horizon_white.css">
      <link rel="stylesheet" href="../ws30/ws10_20/theme/themes/horizon_dark.css">

      <link rel="stylesheet" href="./css/serverlist.css">
</head>

<body>

      <!-- SAP 사운드 재생용 (Electron/Node 자원 유지) -->

      <div id="u4aWsBusyIndicator" class="u4a-busy" role="progressbar" aria-valuetext="Busy" title="Please wait">

      <script src="../ws30/ws10_20/theme/theme-api.js"></script>
