<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>U4A WS3.0 Help</title>

<style>
:root{
  --accent:#1976d2;
  --danger:#e53935;
}

/* =========================
   LAYOUT
========================= */
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  font-family:"Segoe UI",sans-serif;
  overflow:hidden;
  transition:.25s ease;
}

/* =========================
   LIGHT
========================= */
body.theme-light{
  background:#eef1f6;
}

body.theme-light .header{
  background:linear-gradient(180deg,#ffffff,#f4f6fb);
  border-bottom:1px solid rgba(0,0,0,0.06);
  box-shadow:
    12px 12px 24px rgba(0,0,0,0.08),
    -12px -12px 24px rgba(255,255,255,0.9);
}

/* =========================
   DARK
========================= */
body.theme-dark{
  background:#1e1f23;
}

body.theme-dark .header{
  background:#23252b;
  box-shadow:
    8px 8px 16px rgba(0,0,0,0.6),
    -8px -8px 16px rgba(255,255,255,0.04);
}

/* =========================
   HEADER
========================= */
.header{
  height:56px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 16px;
  -webkit-app-region:drag;
}

.group{
  display:flex;
  gap:10px;
}

.btn{
  height:36px;
  min-width:38px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  -webkit-app-region:no-drag;
  transition:.15s ease;
}

/* LIGHT 버튼 */
body.theme-light .btn{
  background:#ffffff;
  color:#333;
  box-shadow:
    6px 6px 14px rgba(0,0,0,0.08),
    -6px -6px 14px rgba(255,255,255,0.9);
}

/* DARK 버튼 */
body.theme-dark .btn{
  background:#2a2c33;
  color:#f1f1f1;
  box-shadow:
    4px 4px 8px rgba(0,0,0,0.6),
    -4px -4px 8px rgba(255,255,255,0.04);
}

.btn:hover{ color:var(--accent); }
.btn.close:hover{ color:var(--danger); }

/* 비활성 상태 */
.btn:disabled{
  opacity:.35;
  pointer-events:none;
  cursor:default;
}

/* =========================
   HEADER HOVER (영역 전체 반전)
========================= */

/* 라이트 테마: 마우스 올리면 약간 더 어둡고 푸른빛이 도는 회색으로 반전 */
body.theme-light .header:hover {
  background: linear-gradient(180deg, #f0f4f8, #e2e8f0);
  border-bottom: 1px solid rgba(25, 118, 210, 0.2); /* 포인트 컬러 살짝 추가 */
  transition: background 0.3s ease;
}

/* 다크 테마: 마우스 올리면 더 깊은 검은색이나 강조색 배경으로 반전 */
body.theme-dark .header:hover {
  background: #1a1b1f; /* 원래보다 더 어두운 색상 */
  box-shadow: 
    8px 8px 20px rgba(0,0,0,0.8), 
    -8px -8px 20px rgba(255,255,255,0.02);
  transition: background 0.3s ease;
}

/* =========================
   VIEWER (webview)
========================= */
.viewer{
  position:relative;
  flex:1;
}

.viewer webview{
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  border:none;
}
</style>
</head>

<body class="theme-light">

<div class="header">
  <div class="group">
  <button class="btn" id="backBtn">◀</button>
  <button class="btn" id="forwardBtn">▶</button>
    <!-- <button class="btn" id="reloadBtn">⟳</button> -->
  </div>

  <div class="group">
    <button class="btn" id="minBtn">—</button>
    <button class="btn" id="maxBtn">▢</button>
    <button class="btn close" id="closeBtn">✕</button>
  </div>
</div>

<div class="viewer">

  <!-- webview로 변경 -->
  <!-- <webview id="helpView"
           src="./site/index.html"
           preload="./preload.js"
           allowpopups>
  </webview> -->

  <webview id="helpView"
           src=""
           allowpopups>
  </webview>

</div>

<script>

  const oAPP = {
    
    onStart: function() {
      this.params = oAPP.getParams();
      this.path   = require("path");
      this.remote = require("@electron/remote");
      this.window = this.remote.getCurrentWindow();

      //DOM
      this.webview = document.getElementById('helpView');
      this.backBtn = document.getElementById("backBtn");
      this.forwardBtn = document.getElementById("forwardBtn");
      this.reloadBtn = document.getElementById("reloadBtn");
      this.minBtn = document.getElementById("minBtn");
      this.maxBtn = document.getElementById("maxBtn");
      this.closeBtn = document.getElementById("closeBtn");

      this.webview.preload = './preload.js';

      //🔹이벤트 바인딩
      this.bindEvents();

      this.isdev  = this?.params?.isdev || false;
      this.menuId = this?.params?.startMenuId || '';
      this.languages = this?.params?.languages|| '';
      // this.webview.src = this.menuId 
      //   ? `./site/manual/${this.menuId}/index.html` 
      //   : "./site/index.html";
      // ./site/index.html



      // const langPath = this.languages === 'ko' ? '' : `/${this.languages}`;
      // const basePath = `${this?.params?.helpSiteRoot}${langPath}`;
      const basePath = this?.params?.helpSiteRoot || '';
      //basePath => D:\\U4A\\U4A_Docs\\raw_data_ko\\site

      this.webview.src = this.menuId
        ? `${basePath}/manual/${this.menuId}/index.html`
        : `${basePath}/index.html`;

      // this.webview.src = this.menuId 
      //   ? `${this?.params?.helpSiteRoot}/manual/${this.menuId}/index.html` 
      //   : `${this?.params?.helpSiteRoot}/index.html`;


      //테마
      this._theme = this.params.theme;


    },

 
    bindEvents: function() { 

      //웹뷰 URL만 바뀐 시점
      this.webview.addEventListener("did-navigate", this.onDidNavigate.bind(this));
      this.webview.addEventListener("did-navigate-in-page", this.onDidNavigate.bind(this));

      //웹뷰 dom 시작
      this.webview.addEventListener("dom-ready", this.onDomReady.bind(this));

      //웹뷰 요청
	    this.webview.addEventListener('ipc-message', event => {

          const _message = event?.args[0] || undefined;
          if(!_message){ return; }
        
          switch (_message.channel) {
            case "zoom":
              return this.setViewZoom(_message.data);

            case "themeChange":
              return this.setMainTheme(_message.data);
            
            case "GoBack":
              if (this.webview.canGoBack()) this.webview.goBack();
              return;

            case "GoForward":
              if (this.webview.canGoForward()) this.webview.goForward();
              return;

            default:
              break;
          }

      });


      this.backBtn.onclick = () => { if (this.webview.canGoBack()) this.webview.goBack(); };
      this.forwardBtn.onclick = () => { if (this.webview.canGoForward()) this.webview.goForward(); };
      
      //WINDOW CONTROL
      this.minBtn.onclick = () => this.window.minimize();
      this.maxBtn.onclick = () => (this.window.isMaximized() ? this.window.unmaximize() : this.window.maximize());
      this.closeBtn.onclick = () => this.window.close();

    },


    onDidNavigate:function(e) {

      // 초기 zoom 설정
      if (typeof this?.webview?._zoom === "undefined") {
        this.webview._zoom = this.webview.getZoomFactor();
      }
      this.webview.setZoomFactor(this.webview._zoom);

      // 해시 변경일 경우 딜레이 후 체크
      const delay = e?.isMainFrame === false || e?.isSameDocument ? 100 : 0;      

      setTimeout(() => {
        try {
          this.backBtn.disabled    = !this.webview.canGoBack();
          this.forwardBtn.disabled = !this.webview.canGoForward();
        } catch {
          this.backBtn.disabled    = true;
          this.forwardBtn.disabled = true;
        }
      }, delay);

    },

    //웹뷰 DOM 시작
    onDomReady: async function() {

      this.webview.contextIsolation = false;
      this.webview.nodeintegration = true;       //require와 process 객체같은 node.js API를
      this.webview.plugins = true;                    // webview 내부에서 브라우저 플러그인을 사용할 수 있습니다.
      this.webview.disablewebsecurity = true;    //페이지의 웹 보안을 해제합니다.

      // if(this.isdev){
      //   console.log('개발모드');
      //   this.webview.openDevTools(); 
      // }
    
      console.log('문서 갱신 DOM READY');

      // 초기 테마 설정this._theme 
      await this.setMainTheme(this._theme );
      await this.setWebviewTheme(this._theme);

      this.webview.executeJavaScript(`
        (function(){
          let zoom = 1.0;           // 현재 줌 배율 (1 = 100%)
          const STEP = 0.1;         // 한 번 휠당 변화량 (0.05~0.2 사이가 자연스러움)
          const MAX_ZOOM = 3.0;
          const MIN_ZOOM = 0.3;

          document.addEventListener('wheel', e => {
              // Ctrl 키가 눌려있을 때만 동작
              if (!e.ctrlKey) return;

              // 브라우저 기본 확대/축소 막기 (필수!)
              e.preventDefault();

              // deltaY > 0 → 아래로 휠 (축소), < 0 → 위로 휠 (확대)
              const direction = e.deltaY > 0 ? -1 : 1;

              // 이전 값
              const oldZoom = zoom;

              // 새 값 계산
              zoom += direction * STEP;
              zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom));

              // 소수점 한 자리 또는 두 자리로 반올림 (필요에 따라 조정)
              zoom = Number(zoom.toFixed(2));

              // 변화가 있을 때만 출력 (미세한 노이즈 방지)
              if (zoom !== oldZoom) {
                  u4aAPI.setZoom('zoom', zoom);
              }

          }, { passive: false });   // ← 이 옵션 없으면 preventDefault가 안 먹힘

          document.addEventListener('keydown', (e) => {
            const noModifier = !e.ctrlKey && !e.shiftKey && !e.altKey && !e.metaKey;

            // ESC → 뒤로
            if (e.key === 'Escape' && noModifier) {
              u4aAPI.setBack('GoBack', '');
            }

            // Alt + ← → 뒤로
            if (e.key === 'ArrowLeft' && e.altKey && !e.ctrlKey && !e.shiftKey) {
              u4aAPI.setBack('GoBack', '');
            }

            // Alt + → → 앞으로
            if (e.key === 'ArrowRight' && e.altKey && !e.ctrlKey && !e.shiftKey) {
              u4aAPI.setForward('GoForward', '');
            }
          });


          document.addEventListener('keydown', (e) => {
              // 순수 ESC만 (조합키 전부 안 눌린 상태)
              if (e.key === 'Escape' &&
                  !e.ctrlKey &&
                  !e.shiftKey &&
                  !e.altKey &&
                  !e.metaKey) {
                  
                  u4aAPI.setGoBack('GoBack', '');

              }
          });

          document.addEventListener('keydown', (e) => {
            // Ctrl + 0 (다른 조합키 없음)
            if (e.key === '0' &&
                e.ctrlKey &&
                !e.shiftKey &&
                !e.altKey &&
                !e.metaKey) {

              e.preventDefault();  
              
              // 줌 100%로 초기화 요청
              u4aAPI.setZoom('zoom', 1);
      
            }
          });


          //테마 변경 이벤트
          const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
              if (mutation.attributeName === 'data-md-color-scheme') {
                const scheme = document.body.getAttribute('data-md-color-scheme');
                  if(scheme === "default"){ document.body.style.background = ""; }
                  if(scheme !== "default"){ document.body.style.background = "#1e2029"; }
                  u4aAPI.setTheme('themeChange', scheme);
                  console.log(scheme);
              }
            });
          });

          observer.observe(document.body, {
            attributes: true,
            attributeFilter: ['data-md-color-scheme']
          });


        })();
      `, true);    

      //윈도우 활성 
      this.window.show();      

      this.window.emit("load-finish");
      
    },


    setViewZoom:function(v) {

      this.webview._zoom = v;
      this.webview.setZoomFactor(v);

    },


    // setMainTheme: function(theme) {
    //   const isDark = theme === "dark" || theme === "slate";
    //   this._theme = isDark ? "dark" : "light";
    //   document.body.classList.toggle("theme-dark", isDark);
    //   document.body.classList.toggle("theme-light", !isDark);
    // },

    setMainTheme: function(theme) {
      this._theme = (theme === "dark" || theme === "slate") ? "dark" : "light";
      document.body.classList.toggle("theme-dark", this._theme === "dark");
      document.body.classList.toggle("theme-light", this._theme === "light");
    },

    getMainTheme:function(theme){
      return document.body.classList.contains("theme-dark") ? "dark" : "light";

    },

    setWebviewTheme: async function(theme) {
      const target = theme === "dark" ? "slate" : "default";
      const bgColor = theme === "dark" ? "#1e2029" : "";
      try {
        await this.webview.executeJavaScript(
          `(function(){
            try {
              const targetScheme = ${JSON.stringify(target)};
              const radios = document.querySelectorAll('input[name="__palette"][data-md-color-scheme]');
              for (const r of radios) {
                if (r.getAttribute("data-md-color-scheme") === targetScheme) {
                  if (!r.checked) r.click();
                  break;
                }
              }
              document.body.style.background = ${JSON.stringify(bgColor)};
              return true;
            } catch(e) { return false; }
          })();`,
          true
        );
      } catch {}
    },


    getParams:function(){
      const params = new URLSearchParams(window.location.search);
      const raw = params.get("options");
      if (!raw) return {};
      try {
        return JSON.parse(decodeURIComponent(raw));
      } catch {
        return {};
      }

    },


  };

  document.addEventListener("DOMContentLoaded", oAPP.onStart.bind(oAPP));
   
</script>


</body>
</html>
