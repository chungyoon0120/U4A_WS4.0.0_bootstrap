<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<title>U4A WS3.0 Help</title>

<style>
:root{
  --accent:#1976d2;
  --danger:#e53935;
}

/* =========================
   LAYOUT
========================= */
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  font-family:"Segoe UI",sans-serif;
  overflow:hidden;
  transition:.25s ease;
}

/* =========================
   LIGHT
========================= */
body.theme-light{
  background:#eef1f6;
}

body.theme-light .header{
  background:linear-gradient(180deg,#ffffff,#f4f6fb);
  border-bottom:1px solid rgba(0,0,0,0.06);
  box-shadow:
    12px 12px 24px rgba(0,0,0,0.08),
    -12px -12px 24px rgba(255,255,255,0.9);
}

/* =========================
   DARK
========================= */
body.theme-dark{
  background:#1e1f23;
}

body.theme-dark .header{
  background:#23252b;
  box-shadow:
    8px 8px 16px rgba(0,0,0,0.6),
    -8px -8px 16px rgba(255,255,255,0.04);
}

/* =========================
   HEADER
========================= */
.header{
  height:56px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 16px;
  -webkit-app-region:drag;
}

.group{
  display:flex;
  gap:10px;
}

.btn{
  height:36px;
  min-width:38px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:600;
  -webkit-app-region:no-drag;
  transition:.15s ease;
}

/* LIGHT 버튼 */
body.theme-light .btn{
  background:#ffffff;
  color:#333;
  box-shadow:
    6px 6px 14px rgba(0,0,0,0.08),
    -6px -6px 14px rgba(255,255,255,0.9);
}

/* DARK 버튼 */
body.theme-dark .btn{
  background:#2a2c33;
  color:#f1f1f1;
  box-shadow:
    4px 4px 8px rgba(0,0,0,0.6),
    -4px -4px 8px rgba(255,255,255,0.04);
}

.btn:hover{ color:var(--accent); }
.btn.close:hover{ color:var(--danger); }

/* 비활성 상태 */
.btn:disabled{
  opacity:.35;
  pointer-events:none;
  cursor:default;
}

/* =========================
   VIEWER (webview)
========================= */
.viewer{
  position:relative;
  flex:1;
}

.viewer webview{
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  border:none;
}
</style>
</head>

<body class="theme-light">

<div class="header">
  <div class="group">
    <button class="btn" id="backBtn">←</button>
    <button class="btn" id="forwardBtn">→</button>
    <button class="btn" id="reloadBtn">⟳</button>
  </div>

  <div class="group">
    <button class="btn" id="minBtn">—</button>
    <button class="btn" id="maxBtn">▢</button>
    <button class="btn close" id="closeBtn">✕</button>
  </div>
</div>

<div class="viewer">
  <!-- webview로 변경 -->
  <webview id="helpView"
           src="./site/index.html"
           allowpopups></webview>
</div>

<script>
/* =========================================================
   ELECTRON BRIDGE
========================================================= */
const remote = require("@electron/remote");
const { shell } = require("electron");
const win = remote.getCurrentWindow();

/* =========================================================
   DOM
========================================================= */
const view = document.getElementById("helpView");

const backBtn = document.getElementById("backBtn");
const forwardBtn = document.getElementById("forwardBtn");
const reloadBtn = document.getElementById("reloadBtn");

const minBtn = document.getElementById("minBtn");
const maxBtn = document.getElementById("maxBtn");
const closeBtn = document.getElementById("closeBtn");

/* =========================================================
   OPTIONS (초기값 전용)
========================================================= */
function getOptions() {
  const params = new URLSearchParams(window.location.search);
  const raw = params.get("options");
  if (!raw) return {};
  try {
    return JSON.parse(decodeURIComponent(raw));
  } catch {
    return {};
  }
}
const options = getOptions();
console.log("options:", options);

/* =========================================================
   THEME UTIL (MAIN WINDOW)
========================================================= */
function setMainTheme(theme) {
  const isDark = theme === "dark";
  document.body.classList.toggle("theme-dark", isDark);
  document.body.classList.toggle("theme-light", !isDark);
}
function getMainTheme() {
  return document.body.classList.contains("theme-dark") ? "dark" : "light";
}

/* =========================================================
   WINDOW CONTROL
========================================================= */
minBtn.onclick = () => win.minimize();
maxBtn.onclick = () => (win.isMaximized() ? win.unmaximize() : win.maximize());
closeBtn.onclick = () => win.close();

/* =========================================================
   NAVIGATION (webview native)
========================================================= */
function updateNavState() {
  try {
    backBtn.disabled = !view.canGoBack();
    forwardBtn.disabled = !view.canGoForward();
  } catch {
    backBtn.disabled = true;
    forwardBtn.disabled = true;
  }
}

backBtn.onclick = () => { if (view.canGoBack()) view.goBack(); };
forwardBtn.onclick = () => { if (view.canGoForward()) view.goForward(); };
reloadBtn.onclick = () => view.reload();

/* 페이지 이동 이벤트 */
view.addEventListener("did-navigate", updateNavState);
view.addEventListener("did-navigate-in-page", updateNavState);
view.addEventListener("did-finish-load", updateNavState);
view.addEventListener("dom-ready", updateNavState);

/* 새 창/팝업은 OS 브라우저로 */
view.addEventListener("new-window", (e) => {
  e.preventDefault();
  if (e.url) shell.openExternal(e.url);
});

/* =========================================================
   ZOOM (네이티브: setZoomFactor)
   - Ctrl + Wheel 확대/축소 (기본)
   - options.allowZoom === false 이면 비활성
========================================================= */
let zoomLevel = 1;
const ZOOM_STEP = 0.1;
const ZOOM_MIN = 0.5;
const ZOOM_MAX = 3;

function clamp(n, min, max) { return Math.max(min, Math.min(max, n)); }

function applyZoom() {
  try { view.setZoomFactor(zoomLevel); } catch {}
}

function bindZoomWheel() {
  if (options.allowZoom === false) return;

  // webview가 dom-ready 된 뒤에만 안전
  view.addEventListener("dom-ready", async  () => {
    // 기본값 적용
    zoomLevel = clamp(zoomLevel, ZOOM_MIN, ZOOM_MAX);
    applyZoom();

    await view.executeJavaScript(`
      (function(){
        if (window.__u4aZoomBound) return;
        window.__u4aZoomBound = true;

        let z = 1;
        const STEP = 0.1;
        const MIN = 0.5;
        const MAX = 3;

        // 초기 줌(혹시 host에서 setZoomFactor 했다면 동기화도 가능)
        try{
          const { webFrame } = require('electron');
          z = webFrame.getZoomFactor();
        }catch(e){}

        window.addEventListener('wheel', (e) => {
          // Ctrl+Wheel만 줌 처리
          if (!e.ctrlKey) return;

          e.preventDefault();

          z += (e.deltaY < 0 ? STEP : -STEP);
          z = Math.max(MIN, Math.min(MAX, z));

          try{
            const { webFrame } = require('electron');
            webFrame.setZoomFactor(z);
          }catch(e){}
        }, { passive:false });
      })();
    `, true);
    
  });

}
bindZoomWheel();

/* =========================================================
   THEME SYNC (Material theme ↔ main theme)
   webview는 DOM 직접 접근이 불가하므로,
   executeJavaScript로 안전하게 읽고/세팅한다.
========================================================= */
let isThemeSyncing = false;
let initialThemeApplied = false;
let themePollTimer = null;

function jsGetMdScheme() {
  // MkDocs Material: body[data-md-color-scheme="default|slate"]
  return `
    (function(){
      try{
        const b = document.body;
        if(!b) return null;
        const s = b.getAttribute("data-md-color-scheme");
        if(!s) return null;
        return (s === "slate") ? "dark" : "light";
      }catch(e){ return null; }
    })();
  `;
}

function jsSetMdScheme(theme) {
  // Material 공식 palette radio 클릭 방식
  const target = theme === "dark" ? "slate" : "default";
  return `
    (function(){
      try{
        const targetScheme = ${JSON.stringify(target)};
        const radios = document.querySelectorAll('input[name="__palette"][data-md-color-scheme]');
        for(const r of radios){
          if(r.getAttribute("data-md-color-scheme") === targetScheme){
            if(!r.checked) r.click();
            return true;
          }
        }
        return false;
      }catch(e){ return false; }
    })();
  `;
}

async function getWebviewTheme() {
  try {
    return await view.executeJavaScript(jsGetMdScheme(), true);
  } catch {
    return null;
  }
}

async function setWebviewTheme(theme) {
  try {
    await view.executeJavaScript(jsSetMdScheme(theme), true);
  } catch {}
}

// webview -> main
async function syncFromWebview() {
  if (isThemeSyncing) return;
  const t = await getWebviewTheme();
  if (!t) return;

  const mainTheme = getMainTheme();
  if (t === mainTheme) return;

  isThemeSyncing = true;
  setMainTheme(t);
  isThemeSyncing = false;
}

// main -> webview
async function syncToWebview() {
  if (isThemeSyncing) return;

  const mainTheme = getMainTheme();
  const wTheme = await getWebviewTheme();
  if (!wTheme) return;
  if (mainTheme === wTheme) return;

  isThemeSyncing = true;
  await setWebviewTheme(mainTheme);
  isThemeSyncing = false;
}

/* main theme 변경 감지 */
new MutationObserver(() => {
  syncToWebview();
}).observe(document.body, { attributes:true, attributeFilter:["class"] });

/* webview 로드 시: 초기 테마 적용 + 이후 폴링으로 반영 */
view.addEventListener("dom-ready", async () => {
  // 1) 초기 테마 (options.theme가 있으면 단 한번)
  if (!initialThemeApplied && options.theme) {
    isThemeSyncing = true;
    setMainTheme(options.theme);
    await setWebviewTheme(options.theme);
    isThemeSyncing = false;
    initialThemeApplied = true;
  } else {
    // options 없으면 webview 기준으로 main 맞춤
    await syncFromWebview();
  }

  // 2) 폴링: webview 내부 테마(라디오 토글 등) 바뀌면 main 반영
  //    (Material 내부에서 theme 바뀌는 이벤트를 host로 직접 올리기 어려워서 안전 폴링)
  if (themePollTimer) clearInterval(themePollTimer);
  themePollTimer = setInterval(syncFromWebview, 500);

  view.openDevTools({ mode: 'detach' });


});

/* 웹뷰가 죽거나 다시 로드되면 폴링 정리 */
view.addEventListener("destroyed", () => {
  if (themePollTimer) clearInterval(themePollTimer);
  themePollTimer = null;
});

/* =========================================================
   STARTUP: 버튼 상태 초기화
========================================================= */
updateNavState();
</script>

</body>
</html>
