<!DOCTYPE html>
<html lang="en">

<head>
      <title>U4A Workspace #ServerList (Bootstrap)</title>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
      <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
      <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

      <!-- Bootstrap 5.0.2 (라이브러리 기반 재구성) -->
      <link rel="stylesheet" href="../5.0.2/css/bootstrap.min.css">

      <!-- Font Awesome 7.2.0 (아이콘) -->
      <link rel="stylesheet" href="../../fontawesome/7.2.0/css/all.min.css">

      <!-- 서버 리스트 컴포넌트 CSS (Bootstrap 보강) -->
      <link rel="stylesheet" href="./css/serverlist.css">

      <!-- [흰색 플래시 방지 — 동기] 인트로(intro.js)가 넘긴 테마 배경색(BGCOL)을
           첫 페인트 전에 인라인 변수(--boot-bg)로 깔아, 비동기 Bootstrap/테마 CSS 로드 전
           배경이 흰색으로 떨어지는 깜빡임을 막는다. -->
      <script>
            (function () {
                  try {
                        var q = new URLSearchParams(location.search);
                        var bg = q.get("BGCOL");
                        if (bg) { document.documentElement.style.setProperty("--boot-bg", bg); }
                        // 다크 테마(horizon_dark)만 첫 페인트부터 다크 팔레트 적용.
                        // 색상 테마(red/purple/green)는 화이트 베이스이므로 다크로 깔지 않는다.
                        var theme = (q.get("THEME") || "").toLowerCase();
                        if (theme.indexOf("dark") >= 0) {
                              document.documentElement.setAttribute("data-sl-theme", "dark");
                        }
                  } catch (e) { /* 쿼리 없으면 기본 라이트 */ }
            })();
      </script>
</head>

<body>

      <!-- SAP 사운드 재생용 (Electron/Node 자원 유지) -->
      <audio id="u4aWsAudio" style="visibility: hidden;"></audio>

      <!-- 셸 컨텐츠 (ServerList.js 가 동적 렌더) -->
      <div id="content"></div>

      <!-- Busy 오버레이 (원본 ServerList 카드 + 이중 회전링 스피너) -->
      <div id="u4aWsBusyIndicator" class="sl-busy" role="progressbar" aria-valuetext="Busy" title="Please wait">
            <div class="sl-busy__card">
                  <div class="sl-busy__spinner"></div>
            </div>
      </div>

      <!-- 토스트 컨테이너 (Bootstrap toast) -->
      <div id="u4aWsToastWrap" class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index:2100;"></div>

      <!-- Bootstrap 5.0.2 번들 (Popper 포함) -->
      <script src="../5.0.2/js/bootstrap.bundle.min.js"></script>

      <!-- 서버리스트 로직 -->
      <script src="ServerList.js"></script>

</body>

</html>
