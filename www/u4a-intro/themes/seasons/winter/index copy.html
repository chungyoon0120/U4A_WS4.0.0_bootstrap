<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>U4A Intro Final Fix</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">

   <style>
      /* 1. 기본 설정 */
      body, html {
         margin: 0; padding: 0;
         width: 100%; height: 100%;
         overflow: hidden;
         background: transparent !important;
         display: flex; justify-content: center; align-items: center;
         font-family: 'Montserrat', sans-serif;
      }

      /* 2. 눈송이 캔버스 */
      #canvas {
         position: absolute; top: 0; left: 0;
         width: 100%; height: 100%;
         z-index: 20; pointer-events: none;
         transition: opacity 1.5s ease-out;
      }

      /* 3. 비디오 컨테이너 */
      .video-box {
            position: relative;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
            z-index: 10;
      }

      /* 4. 비디오 스타일 (테두리 제거) */
      video {
         width: 70%;
         height: 70%;
         object-fit: contain;

         /* ✔ 마스크 더 넓게 → 선명 영역 확대 */
         -webkit-mask-image: 
               radial-gradient(ellipse at center, black 45%, transparent 85%),
               linear-gradient(to right, transparent, black 20%, black 80%, transparent),
               linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);

         mask-image: 
               radial-gradient(ellipse at center, black 45%, transparent 85%),
               linear-gradient(to right, transparent, black 20%, black 80%, transparent),
               linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);

         -webkit-mask-composite: source-in;
         mask-composite: intersect;

         /* ✔ blur 최소화 */
         filter: blur(0.6px);

         opacity: 0;
         animation: videoIn 1.6s ease-out forwards;

         -webkit-app-region: no-drag;
      }

      @keyframes videoIn { 
         0% { opacity: 0; filter: blur(8px); }
         100% { opacity: 1; filter: blur(0.6px); }
      }

      /* 5. 텍스트 레이어 */
      .text-layer {
         position: absolute;
         top: 50%;
         left: 50%;
         transform: translate(-50%, -50%);

         z-index: 30;
         display: flex;
         align-items: center;
         gap: 35px;

         white-space: nowrap;
         opacity: 0;

         transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
         pointer-events: none;
      }

      .text-layer.active {
         opacity: 1;
         transform: translate(-50%, -50%) scale(1);
      }

      .text-layer.exit {
         opacity: 0;
         transform: translate(-50%, -47%);
         filter: blur(25px);
         transition: all 1s ease-in;
      }

      .logo-ws .w {
         font-size: 250px; /* 기존 230 → 약간만 증가 */
         color: #d000ff;

         text-shadow:
            0 2px 0 rgba(255,255,255,0.25),   /* 상단 라이트 */
            0 6px 18px rgba(0,0,0,0.6),       /* 깊이 */
            0 0 35px rgba(208,0,255,0.8),     /* 네온 */
            0 0 70px rgba(208,0,255,0.45);    /* 외곽 Glow */

         letter-spacing: -12px;
         z-index: 2;
      }

      .logo-ws .s {
         font-size: 200px; /* 기존 180 → 약간 증가 */
         color: #007bff;

         text-shadow:
            0 2px 0 rgba(255,255,255,0.25),
            0 6px 18px rgba(0,0,0,0.6),
            0 0 35px rgba(0,123,255,0.8),
            0 0 70px rgba(0,123,255,0.45);

         margin-left: -35px;
         margin-bottom: 5px;
         z-index: 1;
      }

      .text-line-1 {
         font-size: 136px; /* 기존 48 → 업 */
         font-weight: 800;
         color: #ffffff;

         text-shadow:
            0 2px 0 rgba(0,0,0,0.4),
            0 6px 16px rgba(0,0,0,0.7),
            0 0 12px rgba(255,255,255,0.35);
      }

      .text-line-2 { 
         font-size: 136px; 
         font-weight: 800; 

         background: linear-gradient(
            to right, 
            #c000ff,   /* Deep vivid purple */
            #0066ff    /* Deep vivid blue */
         );

         -webkit-background-clip: text; 
         -webkit-text-fill-color: transparent;
      }


      .workspace-row{
         display:flex;
         align-items:flex-end;
         gap:28px;
      }


      /* 버전 */

      .version-row{
         margin-top: 18px;

         display:flex;
         /* flex-direction: column;  */
         gap:24px;

         font-size:60px;
         font-weight:600;

         opacity:0.9;
      }

      /* Release = 안정 / 기본 정보 */
      .ver-major{
         color:#e6ebff;

         text-shadow:
            0 1px 2px rgba(0,0,0,0.7),
            0 0 8px rgba(120,140,255,0.25);
      }

      /* Patch = 강조 / 변경 정보 */
      .ver-patch{
         color:#c000ff;

         text-shadow:
            0 0 12px rgba(192,0,255,0.45),
            0 1px 2px rgba(0,0,0,0.7);
      }


      /* 자연스러운 종료용 */
      video.fade-out {
         animation: videoOut 1.6s ease forwards;
      }

      @keyframes videoOut {
         0% {
            opacity: 1;
            filter: blur(0.6px);
            transform: scale(1);
         }
         60% {
            opacity: 0.4;
            filter: blur(4px);
            transform: scale(1.05);
         }
         100% {
            opacity: 0;
            filter: blur(12px);
            transform: scale(1.12);
         }
      }

   </style>

</head>
<body onclick="javascript:window.close();">

    <canvas id="canvas"></canvas>

    <div class="video-box">
        <video id="introVideo" autoplay muted playsinline>
            <source src="img/intro.mp4" type="video/mp4">
        </video>
        
        <div class="text-layer" id="textLayer">
            <div class="logo-ws">
                <span class="w">W</span>
                <span class="s">S</span>
            </div>

            <div class="text-group">
                <div class="text-line-1">U4A</div>
                <div class="text-line-2">WORK SPACE</div>

                <!-- ✅ 가로 버전 정보 -->
                <div class="version-row">
                    <span class="ver-major">Release Ver 3.5.9</span>
                    <span class="ver-patch">Patch Level 2</span>
                </div>
            </div>
        </div>


    </div>

    <script>
        /* 1. 눈송이 엔진 */
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];
        let animationFrameId;
        const particleCount = 150; 

        function initSnow() {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            particles = [];
            for(let i=0; i<particleCount; i++) particles.push(new Particle());
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random()*width; this.y = Math.random()*height;
                this.z = Math.random()*10+1; 
                this.s = (11-this.z)*1.5; this.o = (11-this.z)*0.1;
                this.v = (11-this.z)*0.3+0.5;
            }
            update() {
                this.y += this.v; 
                if(this.y > height+10) { this.y=-10; this.x=Math.random()*width; }
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, this.s, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255,255,255,${this.o})`; ctx.fill();
            }
        }

        function animateSnow() {
            ctx.clearRect(0,0,width,height);
            particles.forEach(p=>{ p.update(); p.draw(); });
            animationFrameId = requestAnimationFrame(animateSnow);
        }

        window.addEventListener('resize', initSnow);
        initSnow();
        animateSnow();


        /* ★ 2. 타이밍 로직 수정 (핵심 해결책) ★ */
        const textLayer = document.getElementById('textLayer');
        const video = document.getElementById('introVideo');
        
        // 중복 실행 방지용 플래그
        let isScenarioStarted = false;

        function startScenario() {
            if (isScenarioStarted) return; // 이미 실행됐으면 무시
            isScenarioStarted = true;

            // [1초] 텍스트 등장
            setTimeout(() => { textLayer.classList.add('active'); }, 1000);
            
            // 영상 제거
            setTimeout(() => { 
               // canvas.style.opacity = 0;
               video.classList.add('fade-out');
            }, 6000);
            
            // // [8.5초] 종료
            // setTimeout(() => { cancelAnimationFrame(animationFrameId); }, 8500);
        }

        // [중요] 비디오가 이미 재생 중인지 확인해서 즉시 실행
        if (video.readyState >= 2 || !video.paused) {
            startScenario();

        } else {
            // 재생 중이 아니면 이벤트 대기 (안전장치)
            video.addEventListener('play', startScenario);
            video.addEventListener('canplay', startScenario);
        }

        // 혹시 모르니 강제 재생 시도
        video.play().catch(e => { console.log("Autoplay blocked, waiting for interaction"); });

    </script>
</body>
</html>
